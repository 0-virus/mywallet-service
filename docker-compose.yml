services:
  postgres:
    image: postgres:16
    container_name: rag-virus-postgres
    environment:
      POSTGRES_DB: ragvirus
      POSTGRES_USER: ragvirus
      POSTGRES_PASSWORD: ragvirus
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
